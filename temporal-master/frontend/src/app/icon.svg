<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0A0A0A"/>

  <!-- Outer border — neon green frame -->
  <rect x="3" y="3" width="58" height="58" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.6"/>

  <!-- Corner accents -->
  <polyline points="3,10 3,3 10,3"   fill="none" stroke="#00FF41" stroke-width="2.5"/>
  <polyline points="54,3 61,3 61,10"  fill="none" stroke="#00FF41" stroke-width="2.5"/>
  <polyline points="3,54 3,61 10,61"  fill="none" stroke="#00FF41" stroke-width="2.5"/>
  <polyline points="54,61 61,61 61,54" fill="none" stroke="#00FF41" stroke-width="2.5"/>

  <!-- Letter D — DAKI seal -->
  <path d="M18 16 L18 48 L30 48 C40 48 46 42 46 32 C46 22 40 16 30 16 Z"
        fill="none" stroke="#00FF41" stroke-width="3" stroke-linejoin="round"/>
  <path d="M24 22 L30 22 C36 22 40 26 40 32 C40 38 36 42 30 42 L24 42 Z"
