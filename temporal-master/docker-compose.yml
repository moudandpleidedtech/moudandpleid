services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - quest_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Mount source for --reload hot-reloading; exclude heavyweight dirs
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    networks:
      - quest_network
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js frontend ────────────────────────────────────────────────────────
  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes:
      # Mount source for Next.js dev server hot-reloading
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - quest_network
    depends_on:
      - api

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  quest_network:
    driver: bridge
