[pytest]
# Marks personalizados de GlitchAndGold
markers =
    slow: Tests que involucran timeouts reales (bucles infinitos, memory bombs).
          Ejecutar con: pytest -m slow
          Excluir con:  pytest -m "not slow"

# pytest-asyncio: todos los tests async se tratan como asyncio por defecto
asyncio_mode = auto
# Fixtures y tests comparten el mismo event loop de sesión.
# Requerido para asyncpg: las conexiones del pool quedan ligadas al loop donde se crearon.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope    = session

# Directorios de tests
testpaths = tests

# Formato de output por defecto
addopts = --tb=short
